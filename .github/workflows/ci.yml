name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install runtime deps (for import smoke test)
        run: |
          python -m pip install --upgrade pip
          pip install -r service/requirements.txt

      - name: Run test suite
        run: bash tests/run_tests.sh

      - name: Import smoke test (service boots, routes register)
        env:
          AUDIT_MODE: deterministic
        run: |
          cd service
          python -c "import main; assert len(main.app.routes) > 20; print('routes:', len(main.app.routes))"
